name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PROJECT_NAME: py-template
  LOG_PATH: logs

jobs:
  # ── 정적 코드 분석 (GS 인증: 신뢰성/유지보수성) ──
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --group dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy type check
        run: uv run mypy src/

  # ── 동적 테스트 + 산출물 생성 (GS 인증: 기능 적합성/호환성) ──
  test:
    needs: lint
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --group dev --extra all

      - name: Ensure directories exist (reports, logs)
        run: uv run python -c "from pathlib import Path; Path('reports').mkdir(parents=True, exist_ok=True); Path('logs').mkdir(parents=True, exist_ok=True)"

      - name: "Run tests with coverage and reports (CI: local_only 제외)"
        run: uv run pytest -m "not local_only" --html=reports/test_report.html --self-contained-html --cov=src --cov-report=html:reports/coverage --cov-report=xml:reports/coverage.xml --alluredir=reports/allure-results --junitxml=reports/junit.xml -v

  # ── AI Agentic Reviewer (ARCHITECTURE.md 7.4절 구현) ──
  ai_review:
    needs: lint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # git diff를 위해 전체 히스토리 가져오기

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --group dev

      - name: AI Spec Review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_BASE_REF: ${{ github.base_ref || 'main' }}
        run: |
          # API 키가 없으면 경고만 하고 성공 처리(일단은 선택적 도입)
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "[WARNING] GEMINI_API_KEY is not set. Skipping AI Review."
          else
            uv run python scripts/ai_reviewer.py
          fi

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ matrix.os }}
          path: reports/
          retention-days: 30
